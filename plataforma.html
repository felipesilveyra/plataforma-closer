<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Aprendizaje - Closer de Ventas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #faf9f7; color: #0d0d0d; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #0d0d0d; color: #faf9f7; padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2rem; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .main-content { display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        .sidebar { background: white; padding: 20px; border-radius: 8px; height: fit-content; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .module-list { list-style: none; }
        .module-item { padding: 12px; margin-bottom: 8px; background: #f5f5f5; border-left: 4px solid #0d0d0d; cursor: pointer; border-radius: 4px; }
        .module-item.active { background: #0d0d0d; color: #faf9f7; }
        .content { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .video-card { background: #f5f5f5; border-radius: 8px; overflow: hidden; }
        .video-info { padding: 15px; }
        .watch-btn { width: 100%; background: #0d0d0d; color: #faf9f7; border: none; padding: 10px; border-radius: 4px; cursor: pointer; margin-bottom: 8px; }
        .mark-btn { width: 100%; background: #f0f0f0; color: #0d0d0d; border: 1px solid #ddd; padding: 8px; border-radius: 4px; cursor: pointer; }
        .mark-btn.completed { background: #4caf50; color: white; }
        .video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .video-modal.active { display: flex; }
        .video-modal-content { position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; }
        .video-modal iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }
        .close-modal { position: absolute; top: -40px; right: 0; background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
        .auth-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0d0d0d 0%, #333 100%); z-index: 2000; align-items: center; justify-content: center; }
        .auth-screen.active { display: flex; }
        .auth-form { background: white; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .auth-btn { width: 100%; background: #0d0d0d; color: #faf9f7; border: none; padding: 12px; border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-bottom: 15px; }
        .success-msg { color: #4caf50; font-size: 0.9rem; margin-bottom: 15px; }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0d0d0d, #ff6b6b); transition: width 0.3s; }
        .password-requirements { font-size: 0.85rem; color: #666; margin-top: 10px; }
        .requirement { margin: 5px 0; }
        .requirement.met { color: #4caf50; }
    </style>
</head>
<body>
    <div class="auth-screen active" id="authScreen">
        <div class="auth-form">
            <h2>Bienvenido</h2>
            <div id="loginForm">
                <div id="errorMsg" class="error-msg" style="display: none;"></div>
                <div id="successMsg" class="success-msg" style="display: none;"></div>
                
                <!-- Login Form -->
                <div id="loginSection">
                    <div class="form-group">
                        <label>Usuario</label>
                        <input type="text" id="loginUsername" placeholder="tu_usuario">
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="loginPassword" placeholder="••••••••">
                    </div>
                    <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Ingresar</button>
                    <div style="text-align: center;">
                        <p style="font-size: 0.9rem; color: #666;">Usa las credenciales que recibiste por email</p>
                    </div>
                </div>

                <!-- Activation Form -->
                <div id="activationSection" style="display: none;">
                    <p style="margin-bottom: 20px; color: #666;">Crea tu contraseña para acceder a la plataforma</p>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="activationEmail" placeholder="tu@email.com" readonly>
                    </div>
                    <div class="form-group">
                        <label>Nueva Contraseña</label>
                        <input type="password" id="activationPassword" placeholder="••••••••" oninput="checkPasswordRequirements()">
                    </div>
                    <div class="form-group">
                        <label>Confirmar Contraseña</label>
                        <input type="password" id="activationPasswordConfirm" placeholder="••••••••">
                    </div>
                    <div class="password-requirements">
                        <div class="requirement" id="req-length">✓ Mínimo 8 caracteres</div>
                        <div class="requirement" id="req-uppercase">✓ Una letra mayúscula</div>
                        <div class="requirement" id="req-number">✓ Un número</div>
                    </div>
                    <button class="auth-btn" id="activateBtn" onclick="handleActivation()" style="margin-top: 20px;">Activar Cuenta</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <header>
            <div class="container">
                <h1>🎓 Closer de Ventas</h1>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="handleLogout()">Cerrar Sesión</button>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">Progreso: <strong id="progressText">0%</strong></p>

            <div class="main-content">
                <div class="sidebar">
                    <h3>Módulos</h3>
                    <ul class="module-list" id="moduleList"></ul>
                </div>

                <div class="content">
                    <div style="margin-bottom: 30px; border-bottom: 2px solid #0d0d0d; padding-bottom: 20px;">
                        <h2 id="moduleTitle" style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px;">Módulo 1</h2>
                        <p id="moduleDesc" style="color: #666;"></p>
                    </div>
                    <div class="videos-grid" id="videosGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="video-modal-content">
            <button class="close-modal" onclick="closeVideoModal()">✕</button>
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // Manus API endpoint
        const MANUS_API_URL = "https://educatecloser-8szqzhev.manus.space/api/trpc";

        const modules = [
            {
                id: 1,
                title: "Módulo 1 - Mentalidad",
                description: "Desarrollá la base mental correcta para sostener el proceso",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "f01IpPc95_8" },
                    { id: 2, title: "Video 2", youtubeId: "FmbJ68-WPbY" }
                ]
            },
            {
                id: 2,
                title: "Módulo 2 - Psicología AV",
                description: "Entendé cómo piensa un prospecto",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "OvudxqMer88" },
                    { id: 2, title: "Video 2", youtubeId: "L4WsSR9ZSBI" }
                ]
            },
            {
                id: 3,
                title: "Módulo 3 - Estructura de venta",
                description: "Aprendé a ordenar una llamada de venta",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "kEgfy-2UfWA" },
                    { id: 2, title: "Video 2", youtubeId: "yPOnx3kooE0" }
                ]
            },
            {
                id: 4,
                title: "Módulo 4 - Guiones de Venta",
                description: "Usá guiones como apoyo para tener claridad",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "X65txfCn-c0" },
                    { id: 2, title: "Video 2", youtubeId: "WokQhjQ2Guo" }
                ]
            },
            {
                id: 5,
                title: "Módulo 5 - Rebatir Objeciones",
                description: "Respondé dudas y resistencias del prospecto",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "VY4QDdJFa6o" },
                    { id: 2, title: "Video 2", youtubeId: "FNRVykoMPf4" }
                ]
            },
            {
                id: 6,
                title: "Módulo 6 - Cómo Encontrar Socios",
                description: "Aprendé a acercarte a empresas y alianzas",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "-FJ_jZJ20V0" },
                    { id: 2, title: "Video 2", youtubeId: "_8QWFkDnqUQ" }
                ]
            },
            {
                id: 7,
                title: "Módulo 7 - Ingresos de 6 Cifras",
                description: "La lógica y estructura para construir un camino serio",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "atBqxrtQJnY" },
                    { id: 2, title: "Video 2", youtubeId: "bHvTwN3NLYw" }
                ]
            },
            {
                id: 8,
                title: "Módulo 8 - 7 Errores Mortales",
                description: "Detectá y evitá los errores más comunes",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "Z074SbbCxUA" }
                ]
            }
        ];

        let currentUser = null;
        let completedVideos = {};
        let currentModule = 1;
        let activationToken = null;
        let activationEmail = null;

        function init() {
            // Check if there's an activation token in the URL
            const params = new URLSearchParams(window.location.search);
            activationToken = params.get('token');
            activationEmail = params.get('email');

            if (activationToken && activationEmail) {
                // Show activation form
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('activationSection').style.display = 'block';
                document.getElementById('activationEmail').value = activationEmail;
            } else {
                // Show login form
                loadUserData();
                if (currentUser) {
                    showApp();
                    renderModules();
                    selectModule(1);
                }
            }
        }

        function checkPasswordRequirements() {
            const password = document.getElementById('activationPassword').value;
            const req1 = document.getElementById('req-length');
            const req2 = document.getElementById('req-uppercase');
            const req3 = document.getElementById('req-number');

            if (password.length >= 8) {
                req1.classList.add('met');
            } else {
                req1.classList.remove('met');
            }

            if (/[A-Z]/.test(password)) {
                req2.classList.add('met');
            } else {
                req2.classList.remove('met');
            }

            if (/[0-9]/.test(password)) {
                req3.classList.add('met');
            } else {
                req3.classList.remove('met');
            }
        }

        async function handleActivation() {
            const password = document.getElementById('activationPassword').value;
            const passwordConfirm = document.getElementById('activationPasswordConfirm').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            const activateBtn = document.getElementById('activateBtn');

            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!password || !passwordConfirm) {
                errorMsg.textContent = "Por favor completa todos los campos";
                errorMsg.style.display = 'block';
                return;
            }

            if (password !== passwordConfirm) {
                errorMsg.textContent = "Las contraseñas no coinciden";
                errorMsg.style.display = 'block';
                return;
            }

            if (password.length < 8 || !/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
                errorMsg.textContent = "La contraseña no cumple con los requisitos";
                errorMsg.style.display = 'block';
                return;
            }

            activateBtn.disabled = true;
            activateBtn.textContent = "Activando...";

            try {
                const response = await fetch(`${MANUS_API_URL}/platform.activateAccount`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: activationToken,
                        email: activationEmail,
                        password: password,
                    }),
                });

                const data = await response.json();

                if (data.result?.data?.success) {
                    successMsg.textContent = "¡Cuenta activada! Redirigiendo...";
                    successMsg.style.display = 'block';
                    
                    setTimeout(() => {
                        // Clear URL and show login form
                        window.history.replaceState({}, document.title, window.location.pathname);
                        activationToken = null;
                        activationEmail = null;
                        document.getElementById('activationSection').style.display = 'none';
                        document.getElementById('loginSection').style.display = 'block';
                        document.getElementById('activationPassword').value = '';
                        document.getElementById('activationPasswordConfirm').value = '';
                        document.getElementById('loginUsername').value = activationEmail;
                        document.getElementById('loginPassword').value = password;
                        handleLogin();
                    }, 2000);
                } else {
                    errorMsg.textContent = data.result?.data?.error || "Error al activar la cuenta";
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Activation error:', error);
                errorMsg.textContent = "Error al conectar. Intenta de nuevo.";
                errorMsg.style.display = 'block';
            } finally {
                activateBtn.disabled = false;
                activateBtn.textContent = "Activar Cuenta";
            }
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                errorMsg.textContent = "Por favor completa todos los campos";
                errorMsg.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "Validando...";
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${MANUS_API_URL}/platform.validateCredentials`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        password,
                    }),
                });

                const data = await response.json();

                if (data.result?.data?.success) {
                    const user = data.result.data.user;
                    currentUser = {
                        id: user.id,
                        email: user.email,
                        name: user.name,
                        courseType: user.courseType,
                        username: username,
                    };
                    saveUserData();
                    showApp();
                    renderModules();
                    selectModule(1);
                } else {
                    errorMsg.textContent = data.result?.data?.error || "Credenciales inválidas";
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = "Error al conectar. Intenta de nuevo.";
                errorMsg.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Ingresar";
            }
        }

        function handleLogout() {
            currentUser = null;
            completedVideos = {};
            localStorage.removeItem('userData');
            localStorage.removeItem('completedVideos');
            document.getElementById('authScreen').classList.add('active');
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showApp() {
            document.getElementById('authScreen').classList.remove('active');
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
        }

        function renderModules() {
            const moduleList = document.getElementById('moduleList');
            moduleList.innerHTML = '';
            modules.forEach(mod => {
                const li = document.createElement('li');
                li.className = `module-item ${mod.id === currentModule ? 'active' : ''}`;
                li.textContent = mod.title;
                li.onclick = () => selectModule(mod.id);
                moduleList.appendChild(li);
            });
        }

        function selectModule(moduleId) {
            currentModule = moduleId;
            const module = modules.find(m => m.id === moduleId);
            if (!module) return;

            document.getElementById('moduleTitle').textContent = module.title;
            document.getElementById('moduleDesc').textContent = module.description;

            renderModules();
            renderVideos(module.videos);
            updateProgress();
        }

        function renderVideos(videos) {
            const grid = document.getElementById('videosGrid');
            grid.innerHTML = '';
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                const isCompleted = completedVideos[video.id];
                card.innerHTML = `
                    <div style="background: #000; height: 180px; position: relative;">
                        <img src="https://img.youtube.com/vi/${video.youtubeId}/maxresdefault.jpg" style="width: 100%; height: 100%; object-fit: cover;" />
                        ${isCompleted ? '<div style="position: absolute; top: 10px; right: 10px; background: #4caf50; color: white; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem;">✓ Completado</div>' : ''}
                    </div>
                    <div class="video-info">
                        <h4 style="margin-bottom: 10px;">${video.title}</h4>
                        <button class="watch-btn" onclick="playVideo('${video.youtubeId}')">Ver Video</button>
                        <button class="mark-btn ${isCompleted ? 'completed' : ''}" onclick="toggleVideoCompletion(${video.id})">
                            ${isCompleted ? '✓ Completado' : 'Marcar como visto'}
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function playVideo(youtubeId) {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
            modal.classList.add('active');
        }

        function closeVideoModal() {
            const modal = document.getElementById('videoModal');
            const iframe = document.getElementById('videoFrame');
            iframe.src = '';
            modal.classList.remove('active');
        }

        function toggleVideoCompletion(videoId) {
            if (completedVideos[videoId]) {
                delete completedVideos[videoId];
            } else {
                completedVideos[videoId] = true;
            }
            saveUserData();
            const module = modules.find(m => m.id === currentModule);
            renderVideos(module.videos);
            updateProgress();
        }

        function updateProgress() {
            const totalVideos = modules.reduce((sum, mod) => sum + mod.videos.length, 0);
            const completedCount = Object.keys(completedVideos).length;
            const percentage = Math.round((completedCount / totalVideos) * 100);
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = percentage + '%';
        }

        function saveUserData() {
            localStorage.setItem('userData', JSON.stringify(currentUser));
            localStorage.setItem('completedVideos', JSON.stringify(completedVideos));
        }

        function loadUserData() {
            const userData = localStorage.getItem('userData');
            const completedData = localStorage.getItem('completedVideos');
            if (userData) currentUser = JSON.parse(userData);
            if (completedData) completedVideos = JSON.parse(completedData);
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>

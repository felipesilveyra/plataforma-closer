<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Aprendizaje - Closer de Ventas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0d0d0d;
            --secondary: #faf9f7;
            --accent: #d4af37;
            --text-dark: #1a1a1a;
            --text-light: #666666;
            --border: #e5e5e5;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--secondary);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HEADER */
        header {
            background: var(--primary);
            color: var(--secondary);
            padding: 20px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-email {
            font-size: 14px;
            opacity: 0.8;
        }

        .btn-logout {
            background: var(--accent);
            color: var(--primary);
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: #c9a227;
            transform: translateY(-2px);
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 0;
            min-height: calc(100vh - 70px);
        }

        /* SIDEBAR */
        .sidebar {
            background: var(--primary);
            color: var(--secondary);
            padding: 30px 20px;
            overflow-y: auto;
            max-height: calc(100vh - 70px);
        }

        .sidebar-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .modules-list {
            list-style: none;
        }

        .module-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
        }

        .module-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: var(--accent);
        }

        .module-item.active {
            background: var(--accent);
            color: var(--primary);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .module-progress {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        /* CONTENT */
        .content {
            padding: 40px;
            background: var(--secondary);
            overflow-y: auto;
            max-height: calc(100vh - 70px);
        }

        .module-header {
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
        }

        .module-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
        }

        .module-description {
            font-size: 16px;
            color: var(--text-light);
            max-width: 600px;
        }

        /* VIDEOS GRID */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .video-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .video-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            transform: translateY(-4px);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            position: relative;
            overflow: hidden;
        }

        .video-thumbnail::after {
            content: '▶';
            position: absolute;
            font-size: 48px;
            color: var(--accent);
            opacity: 0.8;
        }

        .video-info {
            padding: 16px;
        }

        .video-number {
            font-size: 12px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .video-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .video-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--success);
            font-weight: 600;
        }

        .video-status.unwatched {
            color: var(--text-light);
        }

        .status-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .status-icon.watched {
            background: var(--success);
            color: white;
        }

        .status-icon.unwatched {
            background: var(--border);
            color: var(--text-light);
        }

        /* PROGRESS BAR */
        .progress-section {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid var(--border);
        }

        .progress-label {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 10px;
            font-weight: 600;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 8px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 900px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--primary);
        }

        .modal-body {
            padding: 30px;
        }

        .video-player {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            margin-bottom: 20px;
            background: var(--primary);
        }

        .video-player iframe {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            border: none;
        }

        .video-description {
            font-size: 16px;
            color: var(--text-light);
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .mark-watched-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .mark-watched-btn:hover {
            background: #059669;
            transform: translateY(-2px);
        }

        .mark-watched-btn.watched {
            background: var(--border);
            color: var(--text-light);
            cursor: default;
        }

        .mark-watched-btn.watched:hover {
            background: var(--border);
            transform: none;
        }

        /* LOGIN PAGE */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, #1a1a1a 100%);
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 100%;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--primary);
            text-align: center;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--primary);
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: #c9a227;
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            background: var(--border);
            color: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }

        .form-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-light);
        }

        .form-toggle button {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: var(--error);
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid var(--error);
        }

        .success-message {
            background: #efe;
            color: var(--success);
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 20px;
            border-left: 4px solid var(--success);
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                display: none;
            }

            .content {
                padding: 20px;
            }

            .module-header h1 {
                font-size: 28px;
            }

            .videos-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                width: 95%;
                max-height: 95vh;
            }

            .modal-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // Configuration
        const API_URL = 'https://educate-online-platform-production.up.railway.app/api';
        const TOKEN_KEY = 'auth_token';
        const USER_KEY = 'auth_user';

        // State
        let currentUser = null;
        let modules = [];
        let videos = [];
        let progress = [];
        let currentModule = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem(TOKEN_KEY);
            if (token) {
                loadUser();
            } else {
                showLoginPage();
            }
        });

        // API Calls
        async function apiCall(endpoint, options = {}) {
            const token = localStorage.getItem(TOKEN_KEY);
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers,
            };

            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(`${API_URL}${endpoint}`, {
                    ...options,
                    headers,
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        logout();
                        return null;
                    }
                    throw new Error(`API error: ${response.status}`);
                }

                return await response.json();
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        async function loadUser() {
            try {
                const user = await apiCall('/user/me');
                if (user) {
                    currentUser = user;
                    loadPlatform();
                } else {
                    showLoginPage();
                }
            } catch (error) {
                showLoginPage();
            }
        }

        async function loadPlatform() {
            try {
                modules = await apiCall('/modules');
                progress = await apiCall('/progress');
                
                if (modules.length > 0) {
                    currentModule = modules[0];
                    await loadModuleVideos(currentModule.id);
                }
                
                showPlatform();
            } catch (error) {
                console.error('Error loading platform:', error);
            }
        }

        async function loadModuleVideos(moduleId) {
            try {
                videos = await apiCall(`/modules/${moduleId}/videos`);
            } catch (error) {
                console.error('Error loading videos:', error);
                videos = [];
            }
        }

        async function markVideoWatched(videoId) {
            try {
                await apiCall('/progress/mark-watched', {
                    method: 'POST',
                    body: JSON.stringify({ videoId }),
                });
                
                progress = await apiCall('/progress');
                render();
            } catch (error) {
                console.error('Error marking video as watched:', error);
            }
        }

        async function register(email, password, name) {
            try {
                const result = await apiCall('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, name }),
                });

                if (result.token) {
                    localStorage.setItem(TOKEN_KEY, result.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(result.user));
                    currentUser = result.user;
                    loadPlatform();
                }
            } catch (error) {
                throw error;
            }
        }

        async function login(email, password) {
            try {
                const result = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password }),
                });

                if (result.token) {
                    localStorage.setItem(TOKEN_KEY, result.token);
                    localStorage.setItem(USER_KEY, JSON.stringify(result.user));
                    currentUser = result.user;
                    loadPlatform();
                }
            } catch (error) {
                throw error;
            }
        }

        function logout() {
            localStorage.removeItem(TOKEN_KEY);
            localStorage.removeItem(USER_KEY);
            currentUser = null;
            showLoginPage();
        }

        // UI Functions
        function showLoginPage() {
            const app = document.getElementById('app');
            let isLogin = true;

            app.innerHTML = `
                <div class="login-container">
                    <div class="login-box">
                        <h1 class="login-title">Closer Elite</h1>
                        <p class="login-subtitle">Plataforma de Aprendizaje</p>
                        
                        <div id="message"></div>
                        
                        <form id="authForm">
                            <div id="nameGroup" class="form-group" style="display: none;">
                                <label class="form-label">Nombre</label>
                                <input type="text" id="name" class="form-input" placeholder="Tu nombre">
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" class="form-input" placeholder="tu@email.com" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label">Contraseña</label>
                                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                            </div>
                            
                            <button type="submit" class="btn-primary" id="submitBtn">Ingresar</button>
                        </form>
                        
                        <div class="form-toggle">
                            <span id="toggleText">¿No tienes cuenta?</span>
                            <button id="toggleBtn">Crear una</button>
                        </div>
                    </div>
                </div>
            `;

            const form = document.getElementById('authForm');
            const toggleBtn = document.getElementById('toggleBtn');
            const nameGroup = document.getElementById('nameGroup');
            const submitBtn = document.getElementById('submitBtn');
            const toggleText = document.getElementById('toggleText');

            toggleBtn.addEventListener('click', (e) => {
                e.preventDefault();
                isLogin = !isLogin;
                nameGroup.style.display = isLogin ? 'none' : 'block';
                submitBtn.textContent = isLogin ? 'Ingresar' : 'Crear Cuenta';
                toggleText.textContent = isLogin ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?';
                toggleBtn.textContent = isLogin ? 'Crear una' : 'Ingresar';
            });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const name = document.getElementById('name').value;
                const messageDiv = document.getElementById('message');

                submitBtn.disabled = true;
                submitBtn.innerHTML = '<span class="loading"></span>';

                try {
                    if (isLogin) {
                        await login(email, password);
                    } else {
                        await register(email, password, name);
                    }
                } catch (error) {
                    messageDiv.innerHTML = `<div class="error-message">${error.message}</div>`;
                    submitBtn.disabled = false;
                    submitBtn.textContent = isLogin ? 'Ingresar' : 'Crear Cuenta';
                }
            });
        }

        function showPlatform() {
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <header>
                    <div class="container">
                        <div class="logo">Closer Elite</div>
                        <div class="user-info">
                            <span class="user-email">${currentUser.email}</span>
                            <button class="btn-logout" id="logoutBtn">Salir</button>
                        </div>
                    </div>
                </header>

                <div class="main-layout">
                    <aside class="sidebar">
                        <div class="sidebar-title">Módulos</div>
                        <ul class="modules-list" id="modulesList"></ul>
                    </aside>

                    <main class="content">
                        <div class="module-header">
                            <h1 id="moduleTitle"></h1>
                            <p class="module-description" id="moduleDesc"></p>
                        </div>

                        <div class="progress-section">
                            <div class="progress-label">Progreso General</div>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                            <div class="progress-text" id="progressText">0 / 0 videos vistos</div>
                        </div>

                        <div class="videos-grid" id="videosGrid"></div>
                    </main>
                </div>

                <div class="modal" id="videoModal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 class="modal-title" id="modalTitle"></h2>
                            <button class="modal-close" id="closeModal">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="video-player" id="videoPlayer"></div>
                            <p class="video-description" id="videoDescription"></p>
                            <button class="mark-watched-btn" id="markWatchedBtn">Marcar como visto</button>
                        </div>
                    </div>
                </div>
            `;

            render();

            document.getElementById('logoutBtn').addEventListener('click', logout);
            document.getElementById('closeModal').addEventListener('click', closeModal);
            document.getElementById('markWatchedBtn').addEventListener('click', handleMarkWatched);
        }

        function render() {
            renderModules();
            renderVideos();
            updateProgress();
        }

        function renderModules() {
            const modulesList = document.getElementById('modulesList');
            modulesList.innerHTML = modules.map(mod => {
                const moduleVideos = videos.filter(v => v.moduleId === mod.id);
                const watchedCount = progress.filter(p => 
                    moduleVideos.some(v => v.id === p.video_id)
                ).length;
                
                return `
                    <li class="module-item ${currentModule.id === mod.id ? 'active' : ''}" 
                        onclick="selectModule(${mod.id})">
                        <strong>Módulo ${mod.moduleNumber}</strong>
                        <div>${mod.title}</div>
                        <div class="module-progress">${watchedCount} / ${moduleVideos.length} videos</div>
                    </li>
                `;
            }).join('');
        }

        function renderVideos() {
            const videosGrid = document.getElementById('videosGrid');
            videosGrid.innerHTML = videos.map(video => {
                const isWatched = progress.some(p => p.video_id === video.id);
                return `
                    <div class="video-card" onclick="openVideo(${video.id}, '${video.title}', '${video.youtubeUrl}')">
                        <div class="video-thumbnail"></div>
                        <div class="video-info">
                            <div class="video-number">Vídeo ${video.videoNumber}</div>
                            <div class="video-title">${video.title}</div>
                            <div class="video-status ${isWatched ? 'watched' : 'unwatched'}">
                                <span class="status-icon ${isWatched ? 'watched' : 'unwatched'}">
                                    ${isWatched ? '✓' : ''}
                                </span>
                                ${isWatched ? 'Visto' : 'No visto'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateProgress() {
            const totalVideos = videos.length;
            const watchedVideos = progress.filter(p => 
                videos.some(v => v.id === p.video_id)
            ).length;

            const percentage = totalVideos > 0 ? (watchedVideos / totalVideos) * 100 : 0;

            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = `${watchedVideos} / ${totalVideos} videos vistos`;
            document.getElementById('moduleTitle').textContent = `Módulo ${currentModule.moduleNumber}: ${currentModule.title}`;
            document.getElementById('moduleDesc').textContent = currentModule.description;
        }

        async function selectModule(moduleId) {
            currentModule = modules.find(m => m.id === moduleId);
            await loadModuleVideos(moduleId);
            render();
        }

        function openVideo(videoId, title, youtubeUrl) {
            const modal = document.getElementById('videoModal');
            document.getElementById('modalTitle').textContent = title;
            
            const videoPlayer = document.getElementById('videoPlayer');
            videoPlayer.innerHTML = `<iframe src="${youtubeUrl}" allowfullscreen></iframe>`;
            
            document.getElementById('videoDescription').textContent = `Viendo: ${title}`;
            
            const isWatched = progress.some(p => p.video_id === videoId);
            const btn = document.getElementById('markWatchedBtn');
            btn.classList.toggle('watched', isWatched);
            btn.textContent = isWatched ? 'Marcado como visto ✓' : 'Marcar como visto';
            btn.dataset.videoId = videoId;
            
            modal.classList.add('active');
        }

        function closeModal() {
            document.getElementById('videoModal').classList.remove('active');
        }

        async function handleMarkWatched() {
            const videoId = parseInt(document.getElementById('markWatchedBtn').dataset.videoId);
            await markVideoWatched(videoId);
            closeModal();
        }

        window.selectModule = selectModule;
        window.openVideo = openVideo;
        window.closeModal = closeModal;
        window.handleMarkWatched = handleMarkWatched;
    </script>
</body>
</html>

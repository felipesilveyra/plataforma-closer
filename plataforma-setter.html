<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Aprendizaje - Setter de Ventas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'DM Sans', sans-serif; background: #faf9f7; color: #0d0d0d; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: #0d0d0d; color: #faf9f7; padding: 20px 0; position: sticky; top: 0; z-index: 100; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        h1 { font-family: 'Playfair Display', serif; font-size: 2rem; }
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { background: #ff6b6b; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; }
        .main-content { display: grid; grid-template-columns: 250px 1fr; gap: 30px; }
        .sidebar { background: white; padding: 20px; border-radius: 8px; height: fit-content; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .module-list { list-style: none; }
        .module-item { padding: 12px; margin-bottom: 8px; background: #f5f5f5; border-left: 4px solid #0d0d0d; cursor: pointer; border-radius: 4px; }
        .module-item.active { background: #0d0d0d; color: #faf9f7; }
        .content { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .videos-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .video-card { background: #f5f5f5; border-radius: 8px; overflow: hidden; }
        .video-info { padding: 15px; }
        .watch-btn { width: 100%; background: #0d0d0d; color: #faf9f7; border: none; padding: 10px; border-radius: 4px; cursor: pointer; margin-bottom: 8px; }
        .mark-btn { width: 100%; background: #f0f0f0; color: #0d0d0d; border: 1px solid #ddd; padding: 8px; border-radius: 4px; cursor: pointer; }
        .mark-btn.completed { background: #4caf50; color: white; }
        .video-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .video-modal.active { display: flex; }
        .video-modal-content { position: relative; width: 90%; max-width: 900px; aspect-ratio: 16/9; }
        .video-modal iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }
        .close-modal { position: absolute; top: -40px; right: 0; background: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; }
        .auth-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0d0d0d 0%, #333 100%); z-index: 2000; align-items: center; justify-content: center; }
        .auth-screen.active { display: flex; }
        .auth-form { background: white; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .auth-btn { width: 100%; background: #0d0d0d; color: #faf9f7; border: none; padding: 12px; border-radius: 4px; cursor: pointer; margin-bottom: 15px; }
        .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-bottom: 15px; }
        .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #0d0d0d, #ff6b6b); transition: width 0.3s; }
    </style>
</head>
<body>
    <div class="auth-screen active" id="authScreen">
        <div class="auth-form">
            <h2>Bienvenido</h2>
            <div id="loginForm">
                <div id="errorMsg" class="error-msg" style="display: none;"></div>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="loginUsername" placeholder="tu_usuario">
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="auth-btn" id="loginBtn" onclick="handleLogin()">Ingresar</button>
                <div style="text-align: center;">
                    <p style="font-size: 0.9rem; color: #666;">Usa las credenciales que recibiste por email</p>
                </div>
            </div>
        </div>
    </div>

    <div id="mainApp" style="display: none;">
        <header>
            <div class="container">
                <h1>🎓 Setter de Ventas</h1>
                <div class="user-info">
                    <span id="userEmail"></span>
                    <button class="logout-btn" onclick="handleLogout()">Cerrar Sesión</button>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <p style="text-align: center; margin-bottom: 20px; color: #666;">Progreso: <strong id="progressText">0%</strong></p>

            <div class="main-content">
                <div class="sidebar">
                    <h3>Módulos</h3>
                    <ul class="module-list" id="moduleList"></ul>
                </div>

                <div class="content">
                    <div style="margin-bottom: 30px; border-bottom: 2px solid #0d0d0d; padding-bottom: 20px;">
                        <h2 id="moduleTitle" style="font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px;">Módulo 1</h2>
                        <p id="moduleDesc" style="color: #666;"></p>
                    </div>
                    <div class="videos-grid" id="videosGrid"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="video-modal-content">
            <button class="close-modal" onclick="closeVideoModal()">✕</button>
            <iframe id="videoFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // Manus API endpoint
        const MANUS_API_URL = "https://3000-iiezyfrm3d571gebmr59x-4aa045ee.us1.manus.computer/api/trpc";

        const modules = [
            {
                id: 1,
                title: "Módulo 1 - Fundamentos del Appointment Setter",
                description: "Aprende los fundamentos esenciales para ser un Setter efectivo",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "f01IpPc95_8" },
                    { id: 2, title: "Video 2", youtubeId: "FmbJ68-WPbY" }
                ]
            },
            {
                id: 2,
                title: "Módulo 2 - Prospección y Prospectos High Ticket",
                description: "Identifica y califica prospectos de alto valor",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "OvudxqMer88" },
                    { id: 2, title: "Video 2", youtubeId: "L4WsSR9ZSBI" }
                ]
            },
            {
                id: 3,
                title: "Módulo 3 - LinkedIn y Sales Navigator",
                description: "Domina LinkedIn como herramienta de prospección",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "kEgfy-2UfWA" },
                    { id: 2, title: "Video 2", youtubeId: "yPOnx3kooE0" }
                ]
            },
            {
                id: 4,
                title: "Módulo 4 - Inicio de Conversaciones y Mensaje de Conexión",
                description: "Crea mensajes que generen respuestas",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "X65txfCn-c0" },
                    { id: 2, title: "Video 2", youtubeId: "WokQhjQ2Guo" }
                ]
            },
            {
                id: 5,
                title: "Módulo 5 - Transición y Detección de Ineficiencias",
                description: "Detecta problemas y necesidades del prospecto",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "VY4QDdJFa6o" },
                    { id: 2, title: "Video 2", youtubeId: "FNRVykoMPf4" }
                ]
            },
            {
                id: 6,
                title: "Módulo 6 - Mensaje de Valor, Oferta y Aplicación por Nicho",
                description: "Posiciona tu valor y cierra citas",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "-FJ_jZJ20V0" },
                    { id: 2, title: "Video 2", youtubeId: "_8QWFkDnqUQ" }
                ]
            },
            {
                id: 7,
                title: "Módulo 7 - Objeciones, Seguimiento y Agenda a Llamada",
                description: "Maneja objeciones y asegura la cita",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "atBqxrtQJnY" },
                    { id: 2, title: "Video 2", youtubeId: "bHvTwN3NLYw" }
                ]
            },
            {
                id: 8,
                title: "Módulo 8 - Convertite en un experto en ManyChat",
                description: "Automatiza tu prospección con ManyChat",
                videos: [
                    { id: 1, title: "Video 1", youtubeId: "Z074SbbCxUA" }
                ]
            }
        ];

        let currentUser = null;
        let completedVideos = {};
        let currentModule = 1;

        function init() {
            loadUserData();
            if (currentUser) {
                showApp();
                renderModules();
                selectModule(1);
            }
        }

        async function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            if (!username || !password) {
                errorMsg.textContent = "Por favor completa todos los campos";
                errorMsg.style.display = 'block';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = "Validando...";
            errorMsg.style.display = 'none';

            try {
                // Call Manus API to validate credentials
                const response = await fetch(`${MANUS_API_URL}/platform.validateCredentials`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        username,
                        password,
                    }),
                });

                const data = await response.json();

                if (data.result?.data?.success) {
                    const user = data.result.data.user;
                    
                    // Verify user has access to Setter course
                    if (user.courseType !== 'setter') {
                        errorMsg.textContent = "No tienes acceso a la formación Setter";
                        errorMsg.style.display = 'block';
                        loginBtn.disabled = false;
                        loginBtn.textContent = "Ingresar";
                        return;
                    }
                    
                    currentUser = {
                        id: user.id,
                        email: user.email,
                        name: user.name,
                        courseType: user.courseType,
                        username: username,
                    };
                    saveUserData();
                    showApp();
                    renderModules();
                    selectModule(1);
                } else {
                    errorMsg.textContent = data.result?.data?.error || "Credenciales inválidas";
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = "Error al conectar. Intenta de nuevo.";
                errorMsg.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = "Ingresar";
            }
        }

        function handleLogout() {
            currentUser = null;
            completedVideos = {};
            localStorage.removeItem('userData');
            localStorage.removeItem('completedVideos');
            document.getElementById('authScreen').classList.add('active');
            document.getElementById('mainApp').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showApp() {
            document.getElementById('authScreen').classList.remove('active');
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userEmail').textContent = currentUser.email;
        }

        function renderModules() {
            const moduleList = document.getElementById('moduleList');
            moduleList.innerHTML = modules.map(mod => {
                const titlePart = mod.title.split(' - ')[1];
                return `
                <li class="module-item ${mod.id === currentModule ? 'active' : ''}" onclick="selectModule(${mod.id})">
                    Módulo ${mod.id} - ${titlePart}
                </li>
            `;
            }).join('');
        }

        function selectModule(moduleId) {
            currentModule = moduleId;
            const module = modules.find(m => m.id === moduleId);
            document.getElementById('moduleTitle').textContent = module.title;
            document.getElementById('moduleDesc').textContent = module.description;
            renderVideos(module.videos);
            renderModules();
            updateProgress();
        }

        function renderVideos(videos) {
            const videosGrid = document.getElementById('videosGrid');
            videosGrid.innerHTML = videos.map((video, idx) => {
                const videoKey = `${currentModule}-${idx}`;
                const isCompleted = completedVideos[videoKey];
                return `
                    <div class="video-card">
                        <div style="width: 100%; height: 180px; background: #000; display: flex; align-items: center; justify-content: center; color: white; font-size: 3rem; cursor: pointer;" onclick="playVideo('${video.youtubeId}')">▶</div>
                        <div class="video-info">
                            <h4 style="font-family: 'Playfair Display', serif; margin-bottom: 10px;">${video.title}</h4>
                            <button class="watch-btn" onclick="playVideo('${video.youtubeId}')">Ver Video</button>
                            <button class="mark-btn ${isCompleted ? 'completed' : ''}" onclick="toggleVideoCompletion('${videoKey}')">
                                ${isCompleted ? '✓ Completado' : 'Marcar como visto'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function playVideo(youtubeId) {
            document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1`;
            document.getElementById('videoModal').classList.add('active');
        }

        function closeVideoModal() {
            document.getElementById('videoModal').classList.remove('active');
            document.getElementById('videoFrame').src = '';
        }

        function toggleVideoCompletion(videoKey) {
            completedVideos[videoKey] = !completedVideos[videoKey];
            saveCompletedVideos();
            const module = modules.find(m => m.id === currentModule);
            renderVideos(module.videos);
            updateProgress();
        }

        function updateProgress() {
            const totalVideos = modules.reduce((sum, mod) => sum + mod.videos.length, 0);
            const completed = Object.values(completedVideos).filter(v => v).length;
            const percentage = Math.round((completed / totalVideos) * 100);
            document.getElementById('progressFill').style.width = percentage + '%';
            document.getElementById('progressText').textContent = percentage + '%';
        }

        function saveUserData() {
            localStorage.setItem('userData', JSON.stringify(currentUser));
        }

        function loadUserData() {
            const data = localStorage.getItem('userData');
            if (data) {
                currentUser = JSON.parse(data);
                completedVideos = JSON.parse(localStorage.getItem('completedVideos') || '{}');
            }
        }

        function saveCompletedVideos() {
            localStorage.setItem('completedVideos', JSON.stringify(completedVideos));
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeVideoModal();
        });

        init();
    </script>
</body>
</html>
